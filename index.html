<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor Lubricantes</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 10px;
  border-radius: 12px;
  width: 220px;
}

.value {
  font-size: 24px;
  font-weight: bold;
}

#senal {
  font-size: 28px;
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<h1>🛢️ Monitor de Lubricantes</h1>

<div class="container">

  <div class="card">
    <h3>Brent</h3>
    <div id="brent" class="value">...</div>
  </div>

  <div class="card">
    <h3>USD/MXN</h3>
    <div id="usd" class="value">...</div>
  </div>

  <div class="card">
    <h3>Tendencia Brent</h3>
    <div id="trendBrent" class="value">...</div>
  </div>

  <div class="card">
    <h3>Tendencia USD</h3>
    <div id="trendUsd" class="value">...</div>
  </div>

</div>

<div id="senal">Analizando mercado...</div>

<canvas id="grafica"></canvas>

<script>

const API_URL = "https://petro-usd.vercel.app/api/brent";

let brentHist = [];
let usdHist = [];
let labels = [];

async function obtenerDatos() {
  try {

    let res = await fetch(API_URL);
    let data = await res.json();
    let brent = data.brent;

    document.getElementById("brent").innerText = "$" + brent.toFixed(2);

    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();
    let usd = usdData.rates.MXN;

    document.getElementById("usd").innerText = usd.toFixed(2);

    let time = new Date().toLocaleTimeString();

    labels.push(time);
    brentHist.push(brent);
    usdHist.push(usd);

    if (labels.length > 20) {
      labels.shift();
      brentHist.shift();
      usdHist.shift();
    }

    analizar();

  } catch (error) {
    console.error(error);
  }
}

function calcularCambio(arr) {
  if (arr.length < 5) return 0;
  return ((arr[arr.length-1] - arr[arr.length-5]) / arr[arr.length-5]) * 100;
}

function analizar() {
  let cambioBrent = calcularCambio(brentHist);
  let cambioUsd = calcularCambio(usdHist);

  document.getElementById("trendBrent").innerText = cambioBrent.toFixed(2) + "%";
  document.getElementById("trendUsd").innerText = cambioUsd.toFixed(2) + "%";

  let señal = document.getElementById("senal");

  // 🔥 lógica enfocada a lubricantes
  if (cambioBrent > 1 && cambioUsd > 0.5) {
    señal.innerText = "🔴 SUBIDA INMINENTE DE LUBRICANTES";
    señal.style.color = "red";
  } 
  else if (cambioBrent > 0.5) {
    señal.innerText = "🟠 PRESIÓN POR CRUDO";
    señal.style.color = "orange";
  }
  else if (cambioUsd > 0.5) {
    señal.innerText = "🟠 PRESIÓN POR TIPO DE CAMBIO";
    señal.style.color = "orange";
  }
  else if (cambioBrent < -1) {
    señal.innerText = "🟢 POSIBLE BAJA DE COSTOS";
    señal.style.color = "green";
  }
  else {
    señal.innerText = "🟡 MERCADO ESTABLE";
    señal.style.color = "yellow";
  }
}

// gráfico
const ctx = document.getElementById("grafica").getContext("2d");

new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Brent',
      data: brentHist
    }]
  }
});

setInterval(obtenerDatos, 60000);
obtenerDatos();

</script>

</body>
</html>
