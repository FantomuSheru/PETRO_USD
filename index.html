<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor Energía PRO+</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  width: 200px;
}

.value {
  font-size: 22px;
  font-weight: bold;
}

#senal {
  font-size: 28px;
  margin-top: 20px;
}

</style>
</head>

<body>

<h1>🛢️ Monitor Lubricantes PRO+</h1>

<div class="container">

  <div class="card">
    <h3>Brent</h3>
    <div id="brent" class="value">...</div>
  </div>

  <div class="card">
    <h3>USD/MXN</h3>
    <div id="usd" class="value">...</div>
  </div>

  <div class="card">
    <h3>Mezcla MX</h3>
    <div id="mezcla" class="value">...</div>
  </div>

  <div class="card">
    <h3>Base Oil</h3>
    <div id="baseoil" class="value">...</div>
  </div>

</div>

<div id="senal">Analizando mercado...</div>

<canvas id="grafica"></canvas>

<script>

const API_URL = "https://petro-usd.vercel.app/api/brent";

let brentHist = [];
let usdHist = [];
let labels = [];

async function obtenerDatos() {
  try {

    let res = await fetch(API_URL);
    let data = await res.json();
    let brent = data.brent;

    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();
    let usd = usdData.rates.MXN;

    document.getElementById("brent").innerText = "$" + brent.toFixed(2);
    document.getElementById("usd").innerText = usd.toFixed(2);

    // 🇲🇽 Mezcla mexicana estimada
    let mezcla = brent - 7;
    document.getElementById("mezcla").innerText = "$" + mezcla.toFixed(2);

    // 📦 Base oil estimado
    let baseOil = (brent * 0.75) * (usd / 17);
    document.getElementById("baseoil").innerText = baseOil.toFixed(2);

    let time = new Date().toLocaleTimeString();

    labels.push(time);
    brentHist.push(brent);
    usdHist.push(usd);

    if (labels.length > 25) {
      labels.shift();
      brentHist.shift();
      usdHist.shift();
    }

    analizar();
    actualizarGrafica();

  } catch (error) {
    console.error(error);
  }
}

// 📉 regresión simple (pendiente)
function pendiente(arr) {
  let n = arr.length;
  if (n < 5) return 0;

  let sumX = 0, sumY = 0, sumXY = 0, sumXX = 0;

  for (let i = 0; i < n; i++) {
    sumX += i;
    sumY += arr[i];
    sumXY += i * arr[i];
    sumXX += i * i;
  }

  return (n * sumXY - sumX * sumY) / (n * sumXX - sumX * sumX);
}

// 🔥 modelo PRO
function analizar() {
  let slopeBrent = pendiente(brentHist);
  let slopeUsd = pendiente(usdHist);

  let score = (slopeBrent * 0.7) + (slopeUsd * 0.3);

  let señal = document.getElementById("senal");

  if (score > 0.05) {
    señal.innerText = "🔴 SUBIDA FUERTE DE COSTOS";
    señal.style.color = "red";
  } 
  else if (score > 0.02) {
    señal.innerText = "🟠 PRESIÓN ALCISTA";
    señal.style.color = "orange";
  }
  else if (score < -0.05) {
    señal.innerText = "🟢 BAJA DE COSTOS";
    señal.style.color = "green";
  }
  else {
    señal.innerText = "🟡 MERCADO ESTABLE";
    señal.style.color = "yellow";
  }
}

// gráfica
const ctx = document.getElementById("grafica").getContext("2d");

let mezclaHist = [];
let baseOilHist = [];

let chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [
      {
        label: 'Brent',
        data: brentHist,
        yAxisID: 'y'
      },
      {
        label: 'Mezcla MX',
        data: mezclaHist,
        yAxisID: 'y'
      },
      {
        label: 'Base Oil',
        data: baseOilHist,
        yAxisID: 'y'
      },
      {
        label: 'USD/MXN',
        data: usdHist,
        yAxisID: 'y1'
      }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      legend: {
        labels: { color: "white" }
      }
    },
    scales: {
      y: {
        position: 'left',
        ticks: { color: "white" }
      },
      y1: {
        position: 'right',
        ticks: { color: "white" },
        grid: {
          drawOnChartArea: false
        }
      },
      x: {
        ticks: { color: "white" }
      }
    }
  }
});
</script>

</body>
</html>
