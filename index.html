<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor Commodities</title>

<link rel="icon" type="image/jpeg" href="LOGOGIPA.jpeg">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #ffffff;
  color: #6E6F72;
  text-align: center;
}

.logo {
  max-width: 150px;
  margin-bottom: 10px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #f5f5f5;
  margin: 8px;
  padding: 12px;
  border-radius: 10px;
  width: 180px;
}

.value {
  font-size: 22px;
  font-weight: bold;
}

#senal {
  font-size: 22px;
  margin: 15px;
  padding: 10px;
  border-radius: 10px;
}

canvas {
  max-width: 1000px;
  margin: 20px auto;
}
</style>
</head>

<body>

<img src="LOGOGIPA.jpeg" class="logo">
<h2>🛢️ Monitor Commodities</h2>

<div class="container">
  <div class="card"><h3>Brent</h3><div id="brent" class="value">...</div></div>
  <div class="card"><h3>USD/MXN</h3><div id="usd" class="value">...</div></div>
  <div class="card"><h3>Mezcla</h3><div id="mezcla" class="value">...</div></div>
  <div class="card"><h3>Índice</h3><div id="indice" class="value">...</div></div>
</div>

<div id="senal">Cargando...</div>

<!-- 🔥 BARÓMETRO -->
<canvas id="gauge" width="300" height="160"></canvas>

<canvas id="grafica"></canvas>

<script>

let brentHist = [], usdHist = [], mezclaHist = [], g1 = [], labels = [];
let indiceAnimado = 0;

// 🎯 BARÓMETRO
function dibujarGauge(valor) {
  const canvas = document.getElementById("gauge");
  const ctx = canvas.getContext("2d");

  let max = 4;
  let porcentaje = Math.min(valor / max, 1);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let cx = canvas.width / 2;
  let cy = canvas.height;
  let r = 120;

  // base
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.lineWidth = 15;
  ctx.strokeStyle = "#eee";
  ctx.stroke();

  // color
  let color = "green";
  if (valor > 1) color = "orange";
  if (valor > 2) color = "red";

  // progreso
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, Math.PI + Math.PI * porcentaje);
  ctx.strokeStyle = color;
  ctx.lineWidth = 15;
  ctx.stroke();

  // aguja
  let angle = Math.PI + Math.PI * porcentaje;
  let x = cx + (r - 10) * Math.cos(angle);
  let y = cy + (r - 10) * Math.sin(angle);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 3;
  ctx.stroke();

  // texto
  ctx.font = "16px Arial";
  ctx.textAlign = "center";
  ctx.fillText(valor.toFixed(2), cx, cy - 20);
}

// animación
function animarGauge(nuevo) {
  function animar() {
    indiceAnimado += (nuevo - indiceAnimado) * 0.05;
    dibujarGauge(indiceAnimado);

    if (Math.abs(indiceAnimado - nuevo) > 0.01) {
      requestAnimationFrame(animar);
    }
  }
  animar();
}

// 📊 ANÁLISIS
function analizar() {

  if (g1.length < 5) return;

  let b0 = brentHist.at(-5);
  let b1 = brentHist.at(-1);

  let u0 = usdHist.at(-5);
  let u1 = usdHist.at(-1);

  let g0 = g1.at(-5);
  let g1v = g1.at(-1);

  let cambioBrent = ((b1 - b0) / b0) * 100;
  let cambioUsd = ((u1 - u0) / u0) * 100;
  let cambioG1 = ((g1v - g0) / g0) * 100;

  let indice = (cambioBrent * 0.5) + (cambioUsd * 0.8) + (cambioG1 * 0.3);

  // ajustes críticos
  if (b1 > 95) indice += 0.5;
  if (u1 > 17.8) indice += 0.5;
  if (b1 > 100 && u1 > 18) indice += 1;

  document.getElementById("indice").innerText = indice.toFixed(2);

  // semáforo
  let s = document.getElementById("senal");

  if (indice > 3) {
    s.innerText = "🔴 SUBIDA FUERTE";
    s.style.color = "red";
  } else if (indice > 2) {
    s.innerText = "🟠 PRESIÓN ALTA";
    s.style.color = "orange";
  } else if (indice > 1) {
    s.innerText = "🟡 PRESIÓN MODERADA";
    s.style.color = "#b59f00";
  } else {
    s.innerText = "🟢 ESTABLE";
    s.style.color = "green";
  }

  animarGauge(indice);
}

// 📡 DATOS
async function obtenerDatos() {

  let brent = 105;
  let usd = 17.2;

  try {
    let r = await fetch("https://petro-usd.vercel.app/api/brent");
    let d = await r.json();
    brent = parseFloat(d.brent);
  } catch {}

  try {
    let r2 = await fetch("https://open.er-api.com/v6/latest/USD");
    let d2 = await r2.json();
    usd = d2.rates.MXN;
  } catch {}

  let mezcla = brent - 7;
  let base1 = (mezcla * 0.8) * (usd / 17.5);

  document.getElementById("brent").innerText = "$" + brent.toFixed(2);
  document.getElementById("usd").innerText = usd.toFixed(2);
  document.getElementById("mezcla").innerText = mezcla.toFixed(2);

  labels.push(new Date().toLocaleTimeString());
  brentHist.push(brent);
  usdHist.push(usd);
  mezclaHist.push(mezcla);
  g1.push(base1);

  if (labels.length > 20) {
    labels.shift();
    brentHist.shift();
    usdHist.shift();
    mezclaHist.shift();
    g1.shift();
  }

  analizar();
  chart.update();
}

// 📈 GRÁFICA
let chart = new Chart(document.getElementById("grafica"), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'Brent', data: brentHist, borderColor: '#E8BD14' },
      { label: 'USD', data: usdHist, borderColor: '#47C2D0' },
      { label: 'Group I', data: g1, borderColor: '#F7941E' }
    ]
  }
});

setInterval(obtenerDatos, 10000);
obtenerDatos();

</script>

</body>
</html>
