<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Energía</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .box {
      width: 90%;
      margin: auto;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>📊 Dashboard Energía</h1>

<div class="box">

<!-- 🔴 BRENT -->
<div class="tradingview-widget-container">
  <div id="tradingview_brent"></div>
  <script type="text/javascript">
  new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": "ICEEUR:BRN1!",
    "interval": "5",
    "timezone": "America/Mexico_City",
    "theme": "dark",
    "style": "1",
    "locale": "es",
    "container_id": "tradingview_brent"
  });
  </script>
</div>

<br><br>

<!-- 🔴 USD/MXN -->
<div class="tradingview-widget-container">
  <div id="tradingview_usd"></div>
  <script type="text/javascript">
  new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": "FX_IDC:USDMXN",
    "interval": "5",
    "timezone": "America/Mexico_City",
    "theme": "dark",
    "style": "1",
    "locale": "es",
    "container_id": "tradingview_usd"
  });
  </script>
</div>

</div>

<!-- SCRIPT GLOBAL -->
<script src="https://s3.tradingview.com/tv.js"></script>

</body>
</html>
