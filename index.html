<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Energía</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  justify-content: center;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 15px;
  border-radius: 12px;
  width: 250px;
  font-size: 20px;
}
</style>
</head>

<body>

<h1>📊 Dashboard Energía</h1>

<div class="container">

  <div class="card">
    <h2>Brent 🛢️</h2>
    <p id="brent">Cargando...</p>
  </div>

  <div class="card">
    <h2>USD/MXN 💵</h2>
    <p id="usd">Cargando...</p>
  </div>

</div>

<script>

const API_URL = "https://petro-usd.vercel.app/api/brent";

async function obtenerDatos() {
  try {

    // Brent desde tu API
    let res = await fetch(API_URL);
    let data = await res.json();

    document.getElementById("brent").innerText = "$" + data.brent;

    // USD/MXN
    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();

    document.getElementById("usd").innerText = usdData.rates.MXN.toFixed(2);

  } catch (error) {
    console.error(error);

    document.getElementById("brent").innerText = "Error";
    document.getElementById("usd").innerText = "Error";
  }
}

// ejecutar
obtenerDatos();

// refrescar cada minuto
setInterval(obtenerDatos, 60000);

</script>
</body>
</html>
