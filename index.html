<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor Commodities</title>

<link rel="icon" type="image/jpeg" href="LOGOGIPA.jpeg">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #6E6F72;
  text-align: center;
  margin: 0;
  padding: 20px;
}

.logo {
  max-width: 160px;
  width: 35%;
  margin-bottom: 10px;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 13px;
}

.card {
  background: #f5f5f5;
  margin: 10px;
  padding: 14px;
  border-radius: 12px;
  width: 200px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.value {
  font-size: 24px;
  font-weight: bold;
}

/* CONTENEDOR ALERTA + GAUGE */
#senalContainer {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}

#senal {
  font-size: 24px;
  padding: 12px;
  border-radius: 10px;
  min-width: 250px;
}

/* MINI GAUGE */
#miniGauge {
  width: 120px !important;
  height: 70px !important;
}

canvas {
  width: 95% !important;
  max-width: 1200px;
  height: 380px !important;
  margin: 20px auto;
}

.group1 { color: #F7941E; }
.group2 { color: #9B9B9B; }
.group3 { color: #339966; }

</style>
</head>

<body>

<img src="LOGOGIPA.jpeg" class="logo">
<h2>🛢️ Monitor Commodities - lubricantes</h2>

<div class="container">
  <div class="card">
    <h3>Brent</h3>
    <div id="brent" class="value">...</div>
  </div>
  <div class="card">
    <h3>USD/MXN</h3>
    <div id="usd" class="value">...</div>
  </div>
  <div class="card">
    <h3>Mezcla MX</h3>
    <div id="mezcla" class="value">...</div>
  </div>
</div>

<div class="container">
  <div class="card">
    <h3>Group I</h3>
    <div id="baseoil1" class="value group1">...</div>
  </div>
  <div class="card">
    <h3>Group II</h3>
    <div id="baseoil2" class="value group2">...</div>
  </div>
  <div class="card">
    <h3>Group III</h3>
    <div id="baseoil3" class="value group3">...</div>
  </div>
</div>

<!-- 🔥 ALERTA + BARÓMETRO -->
<div id="senalContainer">
  <div id="senal">Cargando datos...</div>
  <canvas id="miniGauge" width="120" height="70"></canvas>
</div>

<canvas id="grafica"></canvas>

<script>

// HISTÓRICOS
let brentHist = [], usdHist = [], mezclaHist = [];
let g1 = [], g2 = [], g3 = [];
let labels = [];

let indiceAnimado = 0;

// 🧠 🔥 NUEVO ALGORITMO (NIVELES REALES)
function calcularNivel(brent, usd) {

  let puntos = 0;

  // Brent
  if (brent > 100) puntos += 2;
  else if (brent > 95) puntos += 1;
  else if (brent < 80) puntos -= 1;

  // USD
  if (usd >= 18) puntos += 2;
  else if (usd > 17.5) puntos += 1;
  else if (usd < 17) puntos -= 1;

  // combinación crítica
  if (brent > 100 && usd >= 18) puntos += 2;

  return puntos;
}

// 🎨 COLOR + TEXTO
function obtenerNivel(puntos) {
  if (puntos <= 0) return { color: "green", texto: "🟢 NORMAL" };
  if (puntos <= 2) return { color: "#b59f00", texto: "🟡 VIGILAR" };
  if (puntos <= 4) return { color: "orange", texto: "🟠 ALERTA" };
  return { color: "red", texto: "🔴 CRÍTICO" };
}

// 🧭 MINI GAUGE
function dibujarMiniGauge(valor) {
  const canvas = document.getElementById("miniGauge");
  const ctx = canvas.getContext("2d");

  let max = 6;
  let p = Math.min(valor / max, 1);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  let cx = canvas.width / 2;
  let cy = canvas.height;
  let r = 50;

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0);
  ctx.lineWidth = 8;
  ctx.strokeStyle = "#ddd";
  ctx.stroke();

  let color = "green";
  if (valor > 2) color = "orange";
  if (valor > 4) color = "red";

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, Math.PI + Math.PI * p);
  ctx.strokeStyle = color;
  ctx.lineWidth = 8;
  ctx.stroke();

  let angle = Math.PI + Math.PI * p;
  let x = cx + (r - 5) * Math.cos(angle);
  let y = cy + (r - 5) * Math.sin(angle);

  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(x, y);
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 2;
  ctx.stroke();
}

// 🎬 ANIMACIÓN
function animarMiniGauge(valor) {
  function animar() {
    indiceAnimado += (valor - indiceAnimado) * 0.08;
    dibujarMiniGauge(indiceAnimado);

    if (Math.abs(indiceAnimado - valor) > 0.01) {
      requestAnimationFrame(animar);
    }
  }
  animar();
}

// 📊 ANÁLISIS NUEVO
function analizar() {
  if (brentHist.length < 1) return;

  let brent = brentHist.at(-1);
  let usd = usdHist.at(-1);

  let puntos = calcularNivel(brent, usd);
  let nivel = obtenerNivel(puntos);

  let señal = document.getElementById("senal");

  señal.innerText = nivel.texto;
  señal.style.color = nivel.color;

  // 🔥 BARÓMETRO
  animarMiniGauge(puntos);
}

// 📡 DATOS
async function obtenerDatos() {
  try {
    let res = await fetch("https://petro-usd.vercel.app/api/brent");
    let data = await res.json();
    let brent = parseFloat(data.brent) || 105;

    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();
    let usd = usdData.rates.MXN;

    let mezcla = brent - 7;
    let base1 = (mezcla * 0.8) * (usd / 17.5);
    let base2 = base1 * 1.22;
    let base3 = base1 * 1.48;

    document.getElementById("brent").innerText = "$" + brent.toFixed(2);
    document.getElementById("usd").innerText = usd.toFixed(2);
    document.getElementById("mezcla").innerText = "$" + mezcla.toFixed(2);
    document.getElementById("baseoil1").innerText = base1.toFixed(2);
    document.getElementById("baseoil2").innerText = base2.toFixed(2);
    document.getElementById("baseoil3").innerText = base3.toFixed(2);

    let time = new Date().toLocaleTimeString();

    labels.push(time);
    brentHist.push(brent);
    usdHist.push(usd);
    mezclaHist.push(mezcla);
    g1.push(base1);
    g2.push(base2);
    g3.push(base3);

    if (labels.length > 20) {
      labels.shift();
      brentHist.shift();
      usdHist.shift();
      mezclaHist.shift();
      g1.shift();
      g2.shift();
      g3.shift();
    }

    analizar();
    chart.update();

  } catch (error) {
    console.error("Error:", error);
  }
}

// 📈 GRÁFICA
let chart = new Chart(document.getElementById("grafica"), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'Brent', data: brentHist, borderColor: '#E8BD14' },
      { label: 'Mezcla', data: mezclaHist, borderColor: '#F17379' },
      { label: 'Group I', data: g1, borderColor: '#F7941E' },
      { label: 'Group II', data: g2, borderColor: '#9B9B9B' },
      { label: 'Group III', data: g3, borderColor: '#339966' },
      { label: 'USD', data: usdHist, borderColor: '#47C2D0' }
    ]
  }
});

setInterval(obtenerDatos, 10000);
obtenerDatos();

</script>

</body>
</html>
