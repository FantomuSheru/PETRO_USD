<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const API_URL = "https://petro-usd.vercel.app/api/brent";

let brentHist = [];
let usdHist = [];
let labels = [];

async function obtenerDatos() {
  try {

    let res = await fetch(API_URL);
    let data = await res.json();
    let brent = data.brent;

    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();
    let usd = usdData.rates.MXN;

    document.getElementById("brent").innerText = "$" + brent.toFixed(2);
    document.getElementById("usd").innerText = usd.toFixed(2);

    let time = new Date().toLocaleTimeString();

    labels.push(time);
    brentHist.push(brent);
    usdHist.push(usd);

    if (labels.length > 25) {
      labels.shift();
      brentHist.shift();
      usdHist.shift();
    }

    analizar();
    predecir();

  } catch (error) {
    console.error(error);
  }
}

// 📊 tendencia
function cambio(arr, n=5) {
  if (arr.length < n) return 0;
  return (arr[arr.length-1] - arr[arr.length-n]) / arr[arr.length-n];
}

// 🔮 MODELO PREDICTIVO
function predecir() {
  if (brentHist.length < 10) return;

  let trendBrent = cambio(brentHist, 5);
  let trendUsd = cambio(usdHist, 5);

  let velocidadBrent = cambio(brentHist, 2);
  let velocidadUsd = cambio(usdHist, 2);

  // 🔥 fórmula simple pero poderosa
  let score = (trendBrent * 0.6) + (trendUsd * 0.3) + (velocidadBrent * 0.1);

  let señal = document.getElementById("senal");
  let pred = document.getElementById("prediccion");

  if (score > 0.02) {
    señal.innerText = "🔴 SUBIDA PROBABLE (3-5 días)";
    señal.style.color = "red";
    pred.innerText = "Alta probabilidad ↑";
  } 
  else if (score > 0.01) {
    señal.innerText = "🟠 PRESIÓN ALCISTA";
    señal.style.color = "orange";
    pred.innerText = "Probabilidad media ↑";
  }
  else if (score < -0.02) {
    señal.innerText = "🟢 POSIBLE BAJA";
    señal.style.color = "green";
    pred.innerText = "Probabilidad ↓";
  }
  else {
    señal.innerText = "🟡 MERCADO LATERAL";
    señal.style.color = "yellow";
    pred.innerText = "Sin señal clara";
  }
}

// 📊 análisis actual
function analizar() {
  let tBrent = (cambio(brentHist) * 100).toFixed(2);
  let tUsd = (cambio(usdHist) * 100).toFixed(2);

  document.getElementById("trendBrent").innerText = tBrent + "%";
  document.getElementById("trendUsd").innerText = tUsd + "%";
}

// gráfico
const ctx = document.getElementById("grafica").getContext("2d");

new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [{
      label: 'Brent',
      data: brentHist
    }]
  }
});

setInterval(obtenerDatos, 60000);
obtenerDatos();

</script>
