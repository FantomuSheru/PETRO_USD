<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard Energía</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  background: #1e293b;
  padding: 20px;
  margin: 15px;
  border-radius: 12px;
  width: 250px;
  font-size: 20px;
}

#senal {
  margin-top: 20px;
  font-size: 28px;
  font-weight: bold;
}

canvas {
  max-width: 900px;
  margin-top: 30px;
}
</style>
</head>

<body>

<h1>📊 Dashboard Energía</h1>

<div class="container">

  <div class="card">
    <h2>Brent 🛢️</h2>
    <p id="brent">Cargando...</p>
  </div>

  <div class="card">
    <h2>USD/MXN 💵</h2>
    <p id="usd">Cargando...</p>
  </div>

</div>

<h2 id="senal">Analizando...</h2>

<canvas id="grafica"></canvas>

<script>

const API_URL = "https://petro-usd.vercel.app/api/brent";

let historial = [];
let etiquetas = [];

async function obtenerDatos() {
  try {

    // 🔹 Brent
    let res = await fetch(API_URL);
    let data = await res.json();
    let brent = data.brent;

    document.getElementById("brent").innerText = "$" + brent;

    // 🔹 USD/MXN
    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();
    let usd = usdData.rates.MXN;

    document.getElementById("usd").innerText = usd.toFixed(2);

    // 📊 guardar histórico
    let hora = new Date().toLocaleTimeString();

    etiquetas.push(hora);
    historial.push(brent);

    if (historial.length > 15) {
      historial.shift();
      etiquetas.shift();
    }

    actualizarGrafica();

    evaluarTendencia();

  } catch (error) {
    console.error(error);

    document.getElementById("brent").innerText = "Error";
    document.getElementById("usd").innerText = "Error";
  }
}

// 🔴 lógica de negocio
function evaluarTendencia() {
  if (historial.length < 3) return;

  let ultimos = historial.slice(-3);
  let cambio = ultimos[2] - ultimos[0];

  let señal = document.getElementById("senal");

  if (cambio > 0.5) {
    señal.innerText = "🔴 SUBIR PRECIOS";
    señal.style.color = "red";
  } else if (cambio < -0.5) {
    señal.innerText = "🟢 BAJANDO";
    señal.style.color = "green";
  } else {
    señal.innerText = "🟡 ESTABLE";
    señal.style.color = "yellow";
  }
}

// 📈 gráfica
const ctx = document.getElementById("grafica").getContext("2d");

let chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: etiquetas,
    datasets: [{
      label: 'Precio Brent',
      data: historial
    }]
  },
  options: {
    plugins: {
      legend: {
        labels: { color: "white" }
      }
    },
    scales: {
      x: {
        ticks: { color: "white" }
      },
      y: {
        ticks: { color: "white" }
      }
    }
  }
});

function actualizarGrafica() {
  chart.update();
}

// 🔄 actualizar cada minuto
setInterval(obtenerDatos, 60000);

// 🚀 primera carga
obtenerDatos();

</script>

</body>
</html>
