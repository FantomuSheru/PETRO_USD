<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor Commodities lubricantes</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial, sans-serif;
  background: #000;
  color: white;
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* LOGO */
.logo {
  max-width: 160px;
  width: 40%;
  height: auto;
}

/* TARJETAS */
.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 18px;
  border-radius: 12px;
  width: 210px;
}

/* LEYENDA PRO */
.legend-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 12px;
  margin-top: 20px;
}

.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #111827;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.legend-item:hover {
  transform: scale(1.05);
}

.color-box {
  width: 14px;
  height: 14px;
  border-radius: 50%;
}

canvas {
  width: 95% !important;
  max-width: 1200px;
  height: 400px !important;
  margin: 20px auto;
}

/* MÓVIL */
@media (max-width: 600px) {
  .legend-item {
    font-size: 12px;
    padding: 6px 10px;
  }
}
</style>
</head>

<body>

<img src="logo.jpeg" class="logo">

<h2>🛢️ Monitor Commodities</h2>

<!-- LEYENDA PERSONALIZADA -->
<div class="legend-container">
  <div class="legend-item"><div class="color-box" style="background:yellow"></div>Brent</div>
  <div class="legend-item"><div class="color-box" style="background:orange"></div>Mezcla MX</div>
  <div class="legend-item"><div class="color-box" style="background:#00ffcc"></div>Group I</div>
  <div class="legend-item"><div class="color-box" style="background:#ffaa00"></div>Group II</div>
  <div class="legend-item"><div class="color-box" style="background:#ff66ff"></div>Group III</div>
  <div class="legend-item"><div class="color-box" style="background:white"></div>USD/MXN</div>
</div>

<canvas id="grafica"></canvas>

<script>
let labels = [];
let brentHist = [], usdHist = [], mezclaHist = [];
let g1 = [], g2 = [], g3 = [];

async function obtenerDatos() {
  let res = await fetch("https://petro-usd.vercel.app/api/brent");
  let data = await res.json();
  let brent = parseFloat(data.brent) || 105;

  let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
  let usdData = await usdRes.json();
  let usd = usdData.rates.MXN;

  let mezcla = brent - 7;
  let base1 = (mezcla * 0.8) * (usd / 17.5);
  let base2 = base1 * 1.22;
  let base3 = base1 * 1.48;

  let time = new Date().toLocaleTimeString();

  labels.push(time);
  brentHist.push(brent);
  usdHist.push(usd);
  mezclaHist.push(mezcla);
  g1.push(base1);
  g2.push(base2);
  g3.push(base3);

  if (labels.length > 20) {
    labels.shift();
    brentHist.shift();
    usdHist.shift();
    mezclaHist.shift();
    g1.shift();
    g2.shift();
    g3.shift();
  }

  chart.update();
}

let chart = new Chart(document.getElementById("grafica"), {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'Brent', data: brentHist, borderColor: 'yellow' },
      { label: 'Mezcla', data: mezclaHist, borderColor: 'orange' },
      { label: 'G1', data: g1, borderColor: '#00ffcc' },
      { label: 'G2', data: g2, borderColor: '#ffaa00' },
      { label: 'G3', data: g3, borderColor: '#ff66ff' },
      { label: 'USD', data: usdHist, borderColor: 'white' }
    ]
  },
  options: {
    plugins: {
      legend: {
        display: false // 🔥 QUITAMOS la fea
      }
    }
  }
});

setInterval(obtenerDatos, 10000);
obtenerDatos();
</script>

</body>
</html>
