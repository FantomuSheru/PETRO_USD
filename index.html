<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Energía</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px;
      border-radius: 12px;
      display: inline-block;
      width: 250px;
    }
    canvas {
      max-width: 800px;
      margin-top: 30px;
    }
  </style>
</head>
<body>

<h1>📊 Dashboard Energía</h1>

<div class="card">
  <h2>Brent 🛢️</h2>
  <p id="brent">Cargando...</p>
</div>

<div class="card">
  <h2>USD/MXN 💵</h2>
  <p id="usd">Cargando...</p>
</div>

<canvas id="grafica"></canvas>

<script>
const API_KEY = "TU_API_KEY_AQUI"; // <-- Reemplaza

let precios = [];
let etiquetas = [];

async function obtenerDatos() {
  try {
    // Brent (Alpha Vantage)
    let brentRes = await fetch(`https://www.alphavantage.co/query?function=BRENT&interval=5min&apikey=${2Z2NE78SGVS6NB9L}`);
    let brentData = await brentRes.json();

    let brentPrecio = Object.values(brentData.data || {})[0]?.value || "N/A";
    document.getElementById("brent").innerText = "$" + brentPrecio;

    // USD/MXN
    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();

    let usdMxn = usdData.rates.MXN;
    document.getElementById("usd").innerText = usdMxn.toFixed(2);

    // Guardar para gráfica
    let hora = new Date().toLocaleTimeString();

    etiquetas.push(hora);
    precios.push(brentPrecio);

    if (etiquetas.length > 10) {
      etiquetas.shift();
      precios.shift();
    }

    actualizarGrafica();

  } catch (error) {
    console.error(error);
  }
}

const ctx = document.getElementById("grafica").getContext("2d");

let chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: etiquetas,
    datasets: [{
      label: 'Precio Brent',
      data: precios
    }]
  }
});

function actualizarGrafica() {
  chart.update();
}

// Actualiza cada 5 min
setInterval(obtenerDatos, 300000);

// Primera carga
obtenerDatos();

</script>

</body>
</html>
