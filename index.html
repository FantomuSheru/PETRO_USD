<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Energía</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      margin: 15px;
      border-radius: 12px;
      width: 250px;
      font-size: 18px;
    }

    iframe {
      margin-top: 30px;
      border-radius: 12px;
      border: none;
    }
  </style>
</head>

<body>

<h1>📊 Dashboard Energía</h1>

<div class="container">
  <div class="card">
    <h2>USD/MXN 💵</h2>
    <p id="usd">Cargando...</p>
  </div>
</div>

<!-- 🔹 GRÁFICO BRENT REAL -->
<iframe 
  src="https://s.tradingview.com/widgetembed/?symbol=ICEEUR:BRN1!&interval=5&theme=dark"
  width="90%" 
  height="500">
</iframe>

<script>

async function obtenerUSD() {
  try {
    let res = await fetch("https://open.er-api.com/v6/latest/USD");
    let data = await res.json();

    document.getElementById("usd").innerText = data.rates.MXN.toFixed(2);

  } catch {
    document.getElementById("usd").innerText = "No disponible";
  }
}

setInterval(obtenerUSD, 60000);
obtenerUSD();

</script>

</body>
</html>
