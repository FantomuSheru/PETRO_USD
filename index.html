<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Monitor Lubricantes</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Arial;
  background: #000000;
  color: white;
  text-align: center;
}

.container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: #1e293b;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  width: 200px;
}

.value {
  font-size: 22px;
  font-weight: bold;
}

#senal {
  font-size: 26px;
  margin-top: 20px;
}

canvas {
  max-width: 1000px;
  margin-top: 30px;
}
  .logo {
  width: 180px;
  display: block;
  margin: 20px auto;
}
</style>
</head>

<body>
<img src="logo.png" class="logo">
<h1>🛢️ Monitor Lubricantes</h1>

<div class="container">

  <div class="card">
    <h3>Brent</h3>
    <div id="brent" class="value">...</div>
  </div>

  <div class="card">
    <h3>USD/MXN</h3>
    <div id="usd" class="value">...</div>
  </div>

  <div class="card">
    <h3>Mezcla MX</h3>
    <div id="mezcla" class="value">...</div>
  </div>

  <div class="card">
    <h3>Base Oil</h3>
    <div id="baseoil" class="value">...</div>
  </div>

</div>

<div id="senal">Analizando...</div>

<canvas id="grafica"></canvas>

<script>

const API_URL = "https://petro-usd.vercel.app/api/brent";

let brentHist = [];
let usdHist = [];
let mezclaHist = [];
let baseOilHist = [];
let labels = [];

async function obtenerDatos() {
  try {

    // Brent
    let res = await fetch(API_URL);
    let data = await res.json();
    let brent = data.brent;

    // USD
    let usdRes = await fetch("https://open.er-api.com/v6/latest/USD");
    let usdData = await usdRes.json();
    let usd = usdData.rates.MXN;

    document.getElementById("brent").innerText = "$" + brent.toFixed(2);
    document.getElementById("usd").innerText = usd.toFixed(2);

    // Mezcla MX (estimada)
    let mezcla = brent - 7;
    document.getElementById("mezcla").innerText = "$" + mezcla.toFixed(2);

    // Base Oil
    let baseOil = (mezcla * 0.8) * (usd / 17.5);
    document.getElementById("baseoil").innerText = baseOil.toFixed(2);

    let time = new Date().toLocaleTimeString();

    labels.push(time);
    brentHist.push(brent);
    usdHist.push(usd);
    mezclaHist.push(mezcla);
    baseOilHist.push(baseOil);

    if (labels.length > 25) {
      labels.shift();
      brentHist.shift();
      usdHist.shift();
      mezclaHist.shift();
      baseOilHist.shift();
    }

    analizar();
    chart.update();

  } catch (error) {
    console.error(error);
  }
}

// 🤖 modelo inteligente
function analizar() {

  if (brentHist.length < 10) return;

  let cambioBrent = brentHist[brentHist.length-1] - brentHist[brentHist.length-5];
  let cambioUsd = usdHist[usdHist.length-1] - usdHist[usdHist.length-5];

  let score = (cambioBrent * 0.7) + (cambioUsd * 2);

  let señal = document.getElementById("senal");

  if (score > 2) {
    señal.innerText = "🔴 SUBIDA FUERTE DE COSTOS";
    señal.style.color = "red";
  } 
  else if (score > 0.5) {
    señal.innerText = "🟠 PRESIÓN ALCISTA";
    señal.style.color = "orange";
  }
  else if (score < -1) {
    señal.innerText = "🟢 BAJA DE COSTOS";
    señal.style.color = "green";
  }
  else {
    señal.innerText = "🟡 MERCADO ESTABLE";
    señal.style.color = "yellow";
  }
}

// 📊 gráfica PRO
const ctx = document.getElementById("grafica").getContext("2d");

let chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels: labels,
    datasets: [
      {
        label: 'Brent',
        data: brentHist,
        yAxisID: 'y'
      },
      {
        label: 'Mezcla MX',
        data: mezclaHist,
        yAxisID: 'y'
      },
      {
        label: 'Base Oil',
        data: baseOilHist,
        yAxisID: 'y'
      },
      {
        label: 'USD/MXN',
        data: usdHist,
        yAxisID: 'y1'
      }
    ]
  },
  options: {
    responsive: true,
    plugins: {
      legend: {
        labels: { color: "white" }
      }
    },
    scales: {
      y: {
        position: 'left',
        ticks: { color: "white" }
      },
      y1: {
        position: 'right',
        ticks: { color: "white" },
        grid: {
          drawOnChartArea: false
        }
      },
      x: {
        ticks: { color: "white" }
      }
    }
  }
});

// loop
setInterval(obtenerDatos, 60000);
obtenerDatos();

</script>

</body>
</html>
